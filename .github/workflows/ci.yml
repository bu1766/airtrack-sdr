name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      matrix:
        runner: [macos-15, macos-15-intel]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install decoder dependencies
        run: brew install dump1090-fa librtlsdr libbladerf libusb ncurses
      - name: Check English UI
        run: ./tests/run-tests.sh
      - name: Build app and DMG
        run: ./scripts/build-macos.sh
      - name: Verify app bundle
        run: ./scripts/verify-bundle.sh
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AirTrack-SDR-${{ matrix.runner }}
          path: |
            dist/*.dmg
            dist/SHA256SUMS-*.txt
